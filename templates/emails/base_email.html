<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject if subject else "PSAT Email" }}</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f9; font-family:Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f9; padding:30px 0;">
        <tr>
            <td align="center">

                <!-- Main Container -->
                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                        <td style="background:#0d6efd; padding:20px; text-align:center;">
                            <h2 style="margin:0; color:#ffffff; font-size:22px; letter-spacing:1px;">
                                PSAT
                            </h2>
                            <p style="margin:5px 0 0; color:#dbe9ff; font-size:13px;">
                                Phishing Simulation & Awareness Tool
                            </p>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:30px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f8f9fa; padding:20px; text-align:center;">
                            <p style="margin:0; font-size:12px; color:#6c757d;">
                                © {{ year }} PSAT. All rights reserved.
                            </p>
                            <p style="margin:8px 0 0; font-size:12px; color:#6c757d;">
                                This email was generated automatically. Please do not reply.
                            </p>
                        </td>
                    </tr>

                </table>
                <!-- End Main Container -->

            </td>
        </tr>
    </table>

</body>
</html>
