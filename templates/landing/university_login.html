<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px;
        }
        .portal {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-panel {
            flex: 1;
            background: #1a1a1a;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-panel h1 {
            color: #fff;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-panel .hint {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 36px;
        }
        .field {
            margin-bottom: 28px;
        }
        .field label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #4b5563;
            color: #fff;
            padding: 10px 0;
            font-size: 15px;
            outline: none;
        }
        .field input:focus { border-bottom-color: #8b5cf6; }
        .password-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #4b5563;
        }
        .password-row input {
            border: none;
            flex: 1;
        }
        .password-row button {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 16px;
            padding: 10px 0 10px 8px;
        }
        .forgot {
            margin: -12px 0 28px;
        }
        .forgot a {
            color: #9ca3af;
            font-size: 13px;
            text-decoration: none;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #7c3aed;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 32px;
        }
        .btn-login:hover { background: #6d28d9; }
        .signup-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9ca3af;
            font-size: 14px;
        }
        .btn-signup {
            padding: 8px 18px;
            border: 1px solid #4b5563;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            font-size: 14px;
            cursor: default;
        }
        .welcome-panel {
            flex: 1;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 50%, #5b21b6 100%);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .welcome-panel::before {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            top: -40px;
            right: -40px;
        }
        .welcome-panel::after {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            bottom: 60px;
            left: -30px;
        }
        .welcome-panel h2 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.25;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .welcome-panel p {
            color: rgba(255,255,255,0.85);
            font-size: 15px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }
        .illustration {
            position: relative;
            z-index: 1;
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
        }
        .illus-person {
            width: 70px;
            height: 120px;
            border: 3px solid #fff;
            border-radius: 40px 40px 0 0;
            background: rgba(255,255,255,0.15);
            position: relative;
        }
        .illus-person::before {
            content: "";
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            border: 3px solid #fff;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }
        .illus-laptop {
            width: 100px;
            height: 60px;
            border: 3px solid #fff;
            border-radius: 6px;
            background: rgba(255,255,255,0.12);
            position: relative;
            margin-bottom: 20px;
        }
        .illus-laptop::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: -8px;
            right: -8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 0 0 4px 4px;
        }
        @media (max-width: 768px) {
            .portal { flex-direction: column; }
            .welcome-panel { min-height: 240px; }
        }
    </style>
</head>
<body>
<div class="portal">
    <div class="login-panel">
        <h1>Login</h1>
        <p class="hint">Enter your account details</p>

        <form action="/track/login-attempt/{{ user_id }}" method="POST">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="dummy_username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="password-row">
                    <input type="password" id="password" name="dummy_password" required>
                    <button type="button" onclick="togglePassword()" aria-label="Show password">&#128065;</button>
                </div>
            </div>
            <div class="forgot"><a href="#">Forgot Password?</a></div>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="signup-row">
            <span>Don't have an account?</span>
            <button type="button" class="btn-signup">Sign up</button>
        </div>
    </div>

    <div class="welcome-panel">
        <h2>Welcome to<br>student portal</h2>
        <p>Login to access your account</p>
        <div class="illustration">
            <div class="illus-person"></div>
            <div class="illus-laptop"></div>
            <div class="illus-person" style="height:100px;"></div>
        </div>
    </div>
</div>
<script>
function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
