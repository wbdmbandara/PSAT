<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest - Welcome</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 8px 0;
        }
        .pinterest-logo {
            width: 48px;
            height: 48px;
            background: #e60023;
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #111;
            margin-bottom: 6px;
        }
        .tagline {
            color: #767676;
            font-size: 16px;
            margin-bottom: 24px;
        }
        .field {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cdcdcd;
            border-radius: 16px;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        .field:focus { border-color: #a5a5a5; box-shadow: 0 0 0 4px rgba(0,132,255,0.2); }
        .btn-continue {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 24px;
            background: #e60023;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn-continue:hover { background: #ad081b; }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: #767676;
            font-size: 12px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #cdcdcd;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            cursor: default;
        }
        .btn-facebook { background: #1877f2; }
        .btn-google { background: #4285f4; }
        .legal {
            margin-top: 18px;
            font-size: 11px;
            color: #767676;
            line-height: 1.5;
        }
        .legal a { color: #111; font-weight: 600; text-decoration: none; }
        .login-link {
            margin-top: 20px;
            font-size: 14px;
            color: #111;
        }
        .login-link a { color: #111; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="pinterest-logo">P</div>
    <h1>Welcome to Pinterest</h1>
    <p class="tagline">Find new ideas to try</p>

    <form action="/track/login-attempt/{{ user_id }}" method="POST">
        <input type="email" name="dummy_username" class="field" placeholder="Email" required>
        <input type="password" name="dummy_password" class="field" placeholder="Enter password" required>
        <input type="text" class="field" placeholder="Age" style="margin-bottom:16px;">
        <button type="submit" class="btn-continue">Continue</button>
    </form>

    <div class="divider">OR</div>
    <button type="button" class="social-btn btn-facebook">Continue with Facebook</button>
    <button type="button" class="social-btn btn-google">Continue with Google</button>

    <p class="legal">
        By continuing, you agree to Pinterest's
        <a href="#">Terms of Service</a> and acknowledge you've read our
        <a href="#">Privacy Policy</a>.
        <a href="#">Notice at collection</a>.
    </p>
    <p class="login-link">Already a member? <a href="#">Log in</a></p>
</div>
</body>
</html>
