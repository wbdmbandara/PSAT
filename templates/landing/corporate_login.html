<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>liquid now - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 24px;
        }
        .login-wrap { width: 100%; max-width: 420px; text-align: center; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1da1f2 0%, #0d8bd9 100%);
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-text { text-align: left; line-height: 1.1; }
        .logo-text .brand { font-size: 28px; font-weight: 700; color: #1da1f2; }
        .logo-text .sub { font-size: 14px; color: #222; font-weight: 600; }
        .subtitle { color: #6b7280; font-size: 15px; margin-bottom: 32px; }
        .field { margin-bottom: 22px; text-align: left; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        .field input:focus { border-color: #1da1f2; box-shadow: 0 0 0 3px rgba(29,161,242,0.15); }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 44px; }
        .toggle-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #374151;
        }
        .forgot { text-align: left; margin: -6px 0 24px; }
        .forgot a { color: #1da1f2; text-decoration: none; font-size: 14px; }
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1da1f2;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-login:hover { background: #0d8bd9; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="logo">
        <div class="logo-icon">L</div>
        <div class="logo-text">
            <div class="brand">liquid</div>
            <div class="sub">now</div>
        </div>
    </div>
    <p class="subtitle">Please login to continue</p>

    <form action="/track/login-attempt/{{ user_id }}" method="POST">
        <div class="field">
            <label for="email">EMAIL ADDRESS</label>
            <input type="text" id="email" name="dummy_username" placeholder="Enter your email address" required>
        </div>
        <div class="field">
            <label for="password">PASSWORD</label>
            <div class="password-wrap">
                <input type="password" id="password" name="dummy_password" placeholder="Password" required>
                <button type="button" class="toggle-eye" onclick="togglePassword()" aria-label="Toggle password">&#128065;</button>
            </div>
        </div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
        <button type="submit" class="btn-login">Login</button>
    </form>
</div>
<script>
function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
